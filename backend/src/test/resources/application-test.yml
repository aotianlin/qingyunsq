# ============================================================
# 集成测试默认配置（standalone 模式）
# multi 模式测试通过 @TestPropertySource 覆盖 tenant.mode=multi
# ============================================================

spring:
  datasource:
    # Testcontainers 通过 @DynamicPropertySource 动态注入
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password: ""
  mail:
    host: localhost
    port: 25
    username: ""
    password: ""
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

sa-token:
  token-name: Authorization
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: tik
  is-log: false

# ---------- 多租户配置（默认 standalone）----------
tenant:
  mode: standalone
  standalone-tenant-id: 1
  root-domain: test.local
  allow-header-fallback: true
  cache:
    max-size: 128
    ttl: 10s

# ---------- AI 配置（测试用 mock）----------
ai:
  provider: mock
  base-url: http://localhost
  api-key: test-key
  model: mock
  rate-limit:
    per-user-per-min: 100
    per-tenant-per-day: 10000

# ---------- 存储配置（测试用本地磁盘）----------
storage:
  type: local
  local:
    path: ./target/test-uploads
# ---------- 搜索配置 ----------
search:
  type: mysql

# ---------- 文件上传 ----------
upload:
  max-file-size: 10MB
  allowed-extensions: pdf,doc,docx,ppt,pptx,xls,xlsx,zip,rar,7z,jpg,jpeg,png,gif,webp,md,markdown

# ---------- 邮件配置（测试环境） ----------
email:
  from: test@campusforum.com
  reset-link-base: http://localhost:3000/reset-password
  app-name: CampusForum-Test
  reset-token-expire-minutes: 30
  rate-limit-max-requests: 5
  rate-limit-window-minutes: 15

# ---------- 限流配置（测试环境禁用） ----------
rate-limit:
  enabled: false

# ---------- 安全配置（测试环境提供占位密钥；登录锁定禁用以保留时序测试可用） ----------
security:
  signed-url-secret: test-signed-url-secret
  login-lockout:
    enabled: false
  crypto:
    master-key: test-only-master-key-32-bytes-minimum-aes-gcm-12345
    legacy-mode: false
  cors:
    allowed-origins:
      - http://localhost:3000
  upload:
    real-mime-check: false
    allowed-asset-hosts: []
  ws-ticket:
    ttl-seconds: 30
    enforced: false

# ---------- WebSocket 来源（测试环境允许任何来源） ----------
ws:
  allowed-origins: "*"

# ---------- 文件预览配置 ----------
preview:
  office-service-url: http://localhost:8012/onlinePreview
  max-preview-size: 52428800
