# ===== 生产环境配置 (Docker) =====
# ⚠️ 本文件不允许任何字面密钥默认值：所有密钥（signed-url-secret、crypto.master-key、
#    redis password、minio access/secret、meilisearch master-key 等）必须通过
#    ENV / Secret Manager 注入，禁止以 "${VAR:default}" 形式提供任何兜底字面量。
#    一旦发现 ":default" 兜底密钥即视为代码评审违规。
#
# ⚠️ API 文档暴露（漏洞 2 / T2.3）：本文件刻意 *不* 声明 springdoc 配置，
#    继承 application.yml 的默认值（springdoc.api-docs.enabled / swagger-ui.enabled
#    由 SPRINGDOC_ENABLED 控制，缺省 false）。**切勿在 prod 环境通过设置
#    ENV `SPRINGDOC_ENABLED=true` 暴露 swagger / api-docs**：即便误开启，
#    DocAccessFilter 仍会基于 active profile 与来源 IP 静默 404 兜底，
#    nginx 层也会 return 404，但这种"靠 Filter 拦截"的姿势属于配置弱点，
#    一旦同时绕过两层防线即直接泄漏全量 API 契约。
#
# 注意：以下凭证必须通过环境变量提供。一旦留空（默认值为空），Spring 启动会因占位符无法解析而失败，
# 强制运维不得使用任何弱默认值。以下变量都没有 ":default" 兜底。
#
# ===========================================================================
# 🔥 2026-05-22 安全加固（security-hardening spec）必读 🔥
# ===========================================================================
# 本次部署前请先完成：
#   1) 应用数据库迁移（详见 db/migrations/README.md）：
#        - V20260522_01__reset_token_hash.sql
#        - V20260522_02__resource_sha256.sql
#   2) 配置以下"新增必填"环境变量（缺失启动失败）：
#        CRYPTO_MASTER_KEY        AES-GCM 主密钥，≥ 32 字节
#        CORS_ALLOWED_ORIGINS     CORS 跨域来源白名单
#   3) 详细操作指南：deploy/SECURITY.md §8
# ===========================================================================
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

logging:
  level:
    com.campusforum: INFO

ai:
  provider: ${AI_PROVIDER:mock}
  base-url: ${AI_BASE_URL:https://api.deepseek.com}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:deepseek-v4-flash}

storage:
  type: minio
  minio:
    endpoint: ${STORAGE_MINIO_ENDPOINT}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket: ${MINIO_BUCKET:campusforum}

search:
  type: meilisearch
  meilisearch:
    host: ${SEARCH_MEILISEARCH_HOST}
    api-key: ${MEILI_MASTER_KEY}

# ---------- 安全相关 ----------
security:
  signed-url-secret: ${SIGNED_URL_SECRET}
  ai-base-url-block-private-network: true
  # AES-GCM 主密钥（≥ 32 字节随机串），无默认值，缺失启动失败
  crypto:
    master-key: ${CRYPTO_MASTER_KEY}
    legacy-mode: ${CRYPTO_LEGACY_MODE:false}
  # CORS 允许的前端来源（逗号分隔），生产必填
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  upload:
    real-mime-check: ${UPLOAD_REAL_MIME_CHECK:true}
    allowed-asset-hosts: ${ALLOWED_ASSET_HOSTS}
  ws-ticket:
    ttl-seconds: ${WS_TICKET_TTL_SECONDS:30}
    enforced: ${WS_TICKET_ENFORCED:false}

# ---------- WebSocket 跨域来源（生产必填，逗号分隔） ----------
ws:
  allowed-origins: ${WS_ALLOWED_ORIGINS}

# ---------- 管理端点（生产仅暴露 health） ----------
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
