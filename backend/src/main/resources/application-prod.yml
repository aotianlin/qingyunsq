# ===== 生产环境配置 (Docker) =====
# 注意：以下凭证必须通过环境变量提供。一旦留空（默认值为空），Spring 启动会因占位符无法解析而失败，
# 强制运维不得使用任何弱默认值。以下变量都没有 ":default" 兜底。
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

logging:
  level:
    com.campusforum: INFO

ai:
  provider: ${AI_PROVIDER:mock}
  base-url: ${AI_BASE_URL:https://api.deepseek.com/v1}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:deepseek-chat}

storage:
  type: minio
  minio:
    endpoint: ${STORAGE_MINIO_ENDPOINT}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket: ${MINIO_BUCKET:campusforum}

search:
  type: meilisearch
  meilisearch:
    host: ${SEARCH_MEILISEARCH_HOST}
    api-key: ${MEILI_MASTER_KEY}

# ---------- 安全相关 ----------
security:
  signed-url-secret: ${SIGNED_URL_SECRET}
  ai-base-url-block-private-network: true

# ---------- WebSocket 跨域来源（生产必填，逗号分隔） ----------
ws:
  allowed-origins: ${WS_ALLOWED_ORIGINS}

# ---------- 管理端点（生产仅暴露 health） ----------
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
