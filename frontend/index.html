<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#18a058" />
    <meta name="description" content="CampusForum - 高校轻量化学习社群平台" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>CampusForum</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('campus-theme');
          var systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored === 'light' || stored === 'dark' ? stored : systemDark ? 'dark' : 'light';
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
          document.querySelector('meta[name="theme-color"]').setAttribute('content', theme === 'dark' ? '#050505' : '#ffffff');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (error) {
          document.documentElement.dataset.theme = 'light';
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    <style>
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
  </head>
  <body class="text-on-surface bg-background font-body-md antialiased">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
