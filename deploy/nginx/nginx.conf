worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 60m;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    server {
        listen 80;
        server_name _;

        # ===== 安全响应头（缺陷 1.26）=====
        # CSP：限制脚本/样式/连接来源；frame-ancestors 'none' 等价于 X-Frame-Options DENY
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: https:; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # HSTS：仅在使用 HTTPS 时启用；HTTP 监听时浏览器会忽略
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # Permissions-Policy：禁用敏感设备 API
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # ===== 屏蔽 actuator（缺陷 1.28，security-audit-hardening T9.6）=====
        # 默认对所有外部请求返回 404；仅 /actuator/prometheus 在内网放行（指标采集）。
        # 必须先匹配更具体的 prometheus location，再匹配 actuator 兜底。
        location = /actuator/prometheus {
            # Prometheus 抓取（漏洞 32 / spec T9.6）：仅放行 docker / 私网 / 本机
            # 注意 nginx 不会自动信任 X-Forwarded-For，allow / deny 校验的是
            # 直连 client（即上一跳 IP），生产部署需保证 Prometheus 与
            # 后端 nginx 处于同一私网。
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            proxy_pass http://app:8080/actuator/prometheus;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location ~ ^/actuator/ {
            return 404;
        }

        # ===== 屏蔽 Knife4j / OpenAPI 文档路径（漏洞 2，security-audit-hardening T2.4）=====
        # 双重屏蔽：DocAccessFilter (T2.2) 在应用层拒绝；nginx 在边缘静默 404，
        # 即使后端 SPRINGDOC_ENABLED 被误开启，外部仍无法读取接口契约。
        location ~ ^/(swagger-ui|v3/api-docs|swagger-resources|doc\.html|webjars)/ {
            return 404;
        }

        # 拦截公网扫描常见的敏感文件和探测路径，避免 SPA 回退把无效路径返回 200。
        location ~ /\.(?!well-known) {
            return 404;
        }

        location ~* ^/(version|containers/json|SDK/webLanguage)$ {
            return 404;
        }

        # PDF / image preview is rendered inside the same-origin resource modal.
        # Keep other pages non-frameable, but allow this API endpoint to be embedded by this site.
        location ~ ^/api/v1/resources/[0-9]+/preview$ {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: https:; frame-ancestors 'self'; base-uri 'self'; object-src 'none'" always;
            add_header X-Frame-Options SAMEORIGIN always;
            add_header X-Content-Type-Options nosniff always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        }

        # 前端静态资源
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # API 反代
        location /api/ {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket
        location /ws/ {
            # ===== WS legacy token query 拒绝（漏洞 8 / TDEPLOY.1）=====
            # 当 WS_TICKET_ENFORCED=true 全量切换到 ticket 后，本块阻止任何
            # 仍把 token 放在 query string 的连接（避免 token 出现在 nginx access log
            # 与浏览器 history）。当前默认未启用（注释包裹），灰度收尾后再放开。
            # 生效条件：观察一周 ws_legacy_token_used_total = 0 之后取消注释。
            #
            # if ($args ~* (^|&)token=) {
            #     return 400;
            # }

            proxy_pass http://app:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
