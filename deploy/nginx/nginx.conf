worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 60m;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    server {
        listen 80;
        server_name _;

        # ===== 安全响应头（缺陷 1.26）=====
        # CSP：限制脚本/样式/连接来源；frame-ancestors 'none' 等价于 X-Frame-Options DENY
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: https:; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # HSTS：仅在使用 HTTPS 时启用；HTTP 监听时浏览器会忽略
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # Permissions-Policy：禁用敏感设备 API
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # ===== 屏蔽 actuator（缺陷 1.28）=====
        # 外部网络一律返回 404；运维如需访问，应通过内部网络直连应用 8080 端口
        location ~ ^/actuator/ {
            return 404;
        }

        # 前端静态资源
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # API 反代
        location /api/ {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket
        location /ws/ {
            proxy_pass http://app:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
