version: "3.8"

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - app
    restart: always

  app:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL:-jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - TENANT_MODE=${TENANT_MODE:-standalone}
      - SIGNED_URL_SECRET=${SIGNED_URL_SECRET}
      - CRYPTO_MASTER_KEY=${CRYPTO_MASTER_KEY}
      - CRYPTO_LEGACY_MODE=${CRYPTO_LEGACY_MODE:-false}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - WS_ALLOWED_ORIGINS=${WS_ALLOWED_ORIGINS}
      - WS_TICKET_ENFORCED=${WS_TICKET_ENFORCED:-false}
      - WS_TICKET_TTL_SECONDS=${WS_TICKET_TTL_SECONDS:-30}
      - SPRINGDOC_ENABLED=${SPRINGDOC_ENABLED:-false}
      - AI_PROVIDER=${AI_PROVIDER:-mock}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_BASE_URL=${AI_BASE_URL:-https://api.deepseek.com}
      - AI_MODEL=${AI_MODEL:-deepseek-v4-flash}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_API_KEY
      - MIMO_BASE_URL=${MIMO_BASE_URL:-https://api.xiaomimimo.com/v1}
      - MIMO_API_KEY
      - STORAGE_TYPE=${STORAGE_TYPE:-oss}
      - STORAGE_LOCAL_PATH=${STORAGE_LOCAL_PATH:-/app/uploads}
      - STORAGE_OSS_ENDPOINT=${STORAGE_OSS_ENDPOINT}
      - STORAGE_OSS_HOST=${STORAGE_OSS_HOST:-}
      - OSS_ACCESS_KEY=${OSS_ACCESS_KEY}
      - OSS_SECRET_KEY=${OSS_SECRET_KEY}
      - OSS_BUCKET=${OSS_BUCKET}
      - ALLOWED_ASSET_HOSTS=${ALLOWED_ASSET_HOSTS:-}
      - SEARCH_MEILISEARCH_HOST=${SEARCH_MEILISEARCH_HOST:-http://meilisearch:7700}
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - EMAIL_MOCK_ENABLED=${EMAIL_MOCK_ENABLED:-false}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_STARTTLS_ENABLE=${SMTP_STARTTLS_ENABLE:-true}
      - SMTP_SSL_ENABLE=${SMTP_SSL_ENABLE:-false}
      - SMTP_PROXY_HOST=${SMTP_PROXY_HOST:-}
      - SMTP_PROXY_PORT=${SMTP_PROXY_PORT:-}
      - SMTP_PROXY_USERNAME=${SMTP_PROXY_USERNAME:-}
      - SMTP_PROXY_PASSWORD=${SMTP_PROXY_PASSWORD:-}
      - SMTP_SOCKS_HOST=${SMTP_SOCKS_HOST:-}
      - SMTP_SOCKS_PORT=${SMTP_SOCKS_PORT:-}
      - SMTP_SSL_PROTOCOLS=${SMTP_SSL_PROTOCOLS:-}
      - SMTP_SSL_TRUST=${SMTP_SSL_TRUST:-}
      - SMTP_SSL_CHECK_SERVER_IDENTITY=${SMTP_SSL_CHECK_SERVER_IDENTITY:-}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM}
      - RESET_LINK_BASE=${RESET_LINK_BASE}
      - WECHAT_MINI_PROGRAM_APP_ID=${WECHAT_MINI_PROGRAM_APP_ID:-}
      - WECHAT_MINI_PROGRAM_APP_SECRET=${WECHAT_MINI_PROGRAM_APP_SECRET:-}
      - QQ_CONNECT_APP_ID=${QQ_CONNECT_APP_ID:-}
      - QQ_CONNECT_APP_KEY=${QQ_CONNECT_APP_KEY:-}
      - GITHUB_OAUTH_CLIENT_ID=${GITHUB_OAUTH_CLIENT_ID:-}
      - GITHUB_OAUTH_CLIENT_SECRET=${GITHUB_OAUTH_CLIENT_SECRET:-}
      - SOCIAL_LOGIN_CONNECT_TIMEOUT_MS=${SOCIAL_LOGIN_CONNECT_TIMEOUT_MS:-5000}
      - SOCIAL_LOGIN_READ_TIMEOUT_MS=${SOCIAL_LOGIN_READ_TIMEOUT_MS:-8000}
      - OFFICE_PREVIEW_URL=${OFFICE_PREVIEW_URL:-http://kkfileview:8012/onlinePreview}
      - UPLOAD_REAL_MIME_CHECK=${UPLOAD_REAL_MIME_CHECK:-true}
      - MANAGEMENT_HEALTH_MAIL_ENABLED=false
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - local_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      meilisearch:
        condition: service_started
    restart: always

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ../db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    restart: always

  meilisearch:
    image: getmeili/meilisearch:v1.9
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    volumes:
      - meili_data:/meili_data
    restart: always

volumes:
  mysql_data:
  redis_data:
  meili_data:
  local_uploads:
