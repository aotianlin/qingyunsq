# ===========================================================================
# CampusForum 生产 Docker Compose 部署配置
# ===========================================================================
#
# 🔥 2026-05-22 安全加固（security-hardening spec）部署须知 🔥
#
# 启动前必须完成：
#   1) 应用数据库迁移：参见 db/migrations/README.md
#        mysql -u $MYSQL_USER -p $MYSQL_PASSWORD $MYSQL_DATABASE \
#          < db/migrations/V20260522_01__reset_token_hash.sql
#        mysql -u $MYSQL_USER -p $MYSQL_PASSWORD $MYSQL_DATABASE \
#          < db/migrations/V20260522_02__resource_sha256.sql
#
#   2) 配置 .env 文件中以下新增变量（缺一启动失败）：
#        CRYPTO_MASTER_KEY      ≥ 32 字节随机串
#        CORS_ALLOWED_ORIGINS   逗号分隔的前端域名
#
# 详细说明：deploy/SECURITY.md
# ===========================================================================

version: "3.8"

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - app
    restart: always

  app:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SA_TOKEN_JWT_SECRET_KEY=${JWT_SECRET}
      - TENANT_MODE=${TENANT_MODE}
      - AI_PROVIDER=${AI_PROVIDER}
      - AI_API_KEY=${AI_API_KEY}
      - AI_BASE_URL=${AI_BASE_URL}
      - AI_MODEL=${AI_MODEL}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER}}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - STORAGE_MINIO_ENDPOINT=${STORAGE_MINIO_ENDPOINT:-http://minio:9000}
      - SEARCH_MEILISEARCH_HOST=${SEARCH_MEILISEARCH_HOST:-http://meilisearch:7700}
      # 资源签名 URL 的 HMAC 密钥（必填，无默认值，缺失则后端启动失败）
      - SIGNED_URL_SECRET=${SIGNED_URL_SECRET}
      # AES-GCM 主密钥（缺陷 1.1，必填，无默认值，长度 ≥ 32 字节）
      - CRYPTO_MASTER_KEY=${CRYPTO_MASTER_KEY}
      # 紧急回滚开关，默认 false；遇到 v1 ECB 旧密文解密链路问题时可临时设为 true
      - CRYPTO_LEGACY_MODE=${CRYPTO_LEGACY_MODE:-false}
      # CORS 允许的前端来源（缺陷 1.30，必填，逗号分隔）
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      # 头像 / 封面 URL 域名白名单（缺陷 1.20，可选）
      - ALLOWED_ASSET_HOSTS=${ALLOWED_ASSET_HOSTS:-}
      # WebSocket 票据强制开关（缺陷 1.3，默认 false 兼容期；建议稳定后切 true）
      - WS_TICKET_ENFORCED=${WS_TICKET_ENFORCED:-false}
      - WS_TICKET_TTL_SECONDS=${WS_TICKET_TTL_SECONDS:-30}
      # 上传 MIME 类型校验开关（缺陷 1.22，默认开启）
      - UPLOAD_REAL_MIME_CHECK=${UPLOAD_REAL_MIME_CHECK:-true}
      # WebSocket 允许的来源（生产必填，CSWSH 防御）
      - WS_ALLOWED_ORIGINS=${WS_ALLOWED_ORIGINS}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@campusforum.com}
      - RESET_LINK_BASE=${RESET_LINK_BASE:-https://localhost/reset-password}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - OFFICE_PREVIEW_URL=${OFFICE_PREVIEW_URL:-http://localhost:8012/onlinePreview}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ../db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    restart: always

  meilisearch:
    image: getmeili/meilisearch:v1.9
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    volumes:
      - meili_data:/meili_data
    restart: always

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    restart: always

volumes:
  mysql_data:
  redis_data:
  meili_data:
  minio_data:
